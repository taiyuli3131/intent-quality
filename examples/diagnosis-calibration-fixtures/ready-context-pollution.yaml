        - "The agent response reused the earlier product-direction assumption."
      premise_status: user-stated
      confidence_range:
        min: 0.84
        max: 0.93
  optional_findings:
    - id: F002
      dimension: intent_preservation
      finding: "The user's narrowed review intent was not preserved."
      evidence:
        - "The current request limited the task to the new prompt."
      premise_status: inferred
      confidence_range:
        min: 0.68
        max: 0.82
  forbidden_findings:
    - dimension: privacy_redaction
      reason: "The fixture uses synthetic generalized text only."
