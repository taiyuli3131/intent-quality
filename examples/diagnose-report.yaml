learning_feedback:
  concepts:
  - concept: authorization_boundary
    why_it_matters: File-capable Agents need explicit permission before crossing from
      discussion into mutation.
    playbook: docs/playbook/authorization-boundary.md
  - concept: response_mode_mismatch
    why_it_matters: Mode labels help keep advice, verification, drafting, execution,
      and persistence separate.
    playbook: docs/playbook/response-mode.md
  - concept: context_pollution
    why_it_matters: Long-running context is useful only when the Agent can tell current
      scope from stale assumptions.
    playbook: docs/playbook/context-pollution.md
  user_tip: Separate discussion, draft, execution, and persistence when asking file-capable
    Agents to work in a project.
  agent_tip: Name the expected mode and ask before crossing from analysis into file
    or durable-state changes.
